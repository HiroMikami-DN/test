name: Update Unit Catalog

on:
  push:
    tags:
      - 'Unit_*_v*'       # Unit_A_v1-0-0 形式のタグ push で自動起動
  workflow_dispatch:       # 手動起動も可能

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # README.md への push に必要

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 全ブランチ・全タグを取得するために必須

      - name: Generate catalog and update README
        run: python3 .github/scripts/generate_catalog.py

      - name: Commit and push updated README
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "chore: update unit catalog [skip ci]" || echo "No changes to commit"
          git push origin main
